services:
  unipm-db:
    build:
      context: .
      dockerfile: database/Dockerfile
    image: unipm-sqlserver:2025-fts
    container_name: unipm-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env}"
      TZ: "Asia/Manila"
    ports:
      - "${UNIPM_DB_PORT:-1433}:1433"
    volumes:
      - unipm-sqlserver-2025-data:/var/opt/mssql
    networks:
      - unipm-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -b -Q "SELECT 1" -o /dev/null',
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  unipm-db-init:
    image: unipm-sqlserver:2025-fts
    container_name: unipm-db-init
    environment:
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env}"
    command:
      [
        "/bin/bash",
        "-c",
        '/opt/mssql-tools18/bin/sqlcmd -S unipm-db -U sa -P "$$MSSQL_SA_PASSWORD" -C -b -i /bootstrap/bootstrap.sql',
      ]
    volumes:
      - ./database/bootstrap.sql:/bootstrap/bootstrap.sql:ro
    depends_on:
      unipm-db:
        condition: service_healthy
    networks:
      - unipm-network

  unipm-api:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: unipm-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: "Server=unipm-db,1433;Database=${UNIPM_DB_NAME:-UniPMDb};User Id=sa;Password=${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env};Encrypt=True;TrustServerCertificate=True;"
      Jwt__Issuer: "${UNIPM_JWT_ISSUER:?Set UNIPM_JWT_ISSUER in .env}"
      Jwt__Audience: "${UNIPM_JWT_AUDIENCE:?Set UNIPM_JWT_AUDIENCE in .env}"
      Jwt__SigningKey: "${UNIPM_JWT_SIGNING_KEY:?Set UNIPM_JWT_SIGNING_KEY in .env}"
      Jwt__AccessTokenMinutes: "${UNIPM_JWT_ACCESS_TOKEN_MINUTES:-15}"
      AuthSession__RefreshTokenDays: "${UNIPM_AUTH_REFRESH_TOKEN_DAYS:-7}"
      AuthSession__WebOrigin: "${UNIPM_WEB_ORIGIN:-http://localhost:5173}"
      UNIPM_DEV_USER_PASSWORD: "${UNIPM_DEV_USER_PASSWORD:-}"
      Embeddings__Enabled: "${UNIPM_EMBEDDINGS_ENABLED:-false}"
      Embeddings__ProviderKey: "${UNIPM_EMBEDDINGS_PROVIDER_KEY:-}"
      Embeddings__BaseAddress: "${UNIPM_EMBEDDINGS_BASE_ADDRESS:-}"
      Embeddings__Path: "${UNIPM_EMBEDDINGS_PATH:-/v1/embeddings}"
      Embeddings__Model: "${UNIPM_EMBEDDINGS_MODEL:-}"
      Embeddings__ApiKey: "${UNIPM_EMBEDDINGS_API_KEY:-}"
      Embeddings__Dimensions: "${UNIPM_EMBEDDINGS_DIMENSIONS:-}"
      Embeddings__TimeoutSeconds: "${UNIPM_EMBEDDINGS_TIMEOUT_SECONDS:-30}"
      Embeddings__MaxBatchSize: "${UNIPM_EMBEDDINGS_MAX_BATCH_SIZE:-16}"
      Embeddings__MaxInputCharacters: "${UNIPM_EMBEDDINGS_MAX_INPUT_CHARACTERS:-4000}"
      Embeddings__AllowRemoteProvider: "${UNIPM_EMBEDDINGS_ALLOW_REMOTE_PROVIDER:-false}"
      Observability__MetricsEnabled: "${UNIPM_METRICS_ENABLED:-false}"
      MaintenanceReview__Enabled: "${UNIPM_MAINTENANCE_REVIEW_ENABLED:-false}"
      MaintenanceReview__MaxSourceRecords: "5"
      MaintenanceReview__RetrievalCandidateLimit: "20"
      MaintenanceReview__MaxFindingCharacters: "2000"
      Summary__Enabled: "${UNIPM_SUMMARY_ENABLED:-false}"
      Summary__ProviderKey: "${UNIPM_SUMMARY_PROVIDER_KEY:-}"
      Summary__BaseAddress: "${UNIPM_SUMMARY_BASE_ADDRESS:-}"
      Summary__Path: "${UNIPM_SUMMARY_PATH:-/v1/chat/completions}"
      Summary__Model: "${UNIPM_SUMMARY_MODEL:-}"
      Summary__ApiKey: "${UNIPM_SUMMARY_API_KEY:-}"
      Summary__ThinkingMode: "${UNIPM_SUMMARY_THINKING_MODE:-}"
      Summary__TimeoutSeconds: "${UNIPM_SUMMARY_TIMEOUT_SECONDS:-30}"
      Summary__MaxPromptCharacters: "${UNIPM_SUMMARY_MAX_PROMPT_CHARACTERS:-12000}"
      Summary__MaxOutputCharacters: "${UNIPM_SUMMARY_MAX_OUTPUT_CHARACTERS:-4000}"
      Summary__MaxSourceTextCharacters: "${UNIPM_SUMMARY_MAX_SOURCE_TEXT_CHARACTERS:-1500}"
      Summary__AllowRemoteProvider: "${UNIPM_SUMMARY_ALLOW_REMOTE_PROVIDER:-false}"
      SummaryExperiment__CaptureGeneratedText: "${UNIPM_SUMMARY_EXPERIMENT_CAPTURE_GENERATED_TEXT:-false}"
      SummaryExperiment__CapturePath: "${UNIPM_SUMMARY_EXPERIMENT_CAPTURE_PATH:-}"
    ports:
      - "${UNIPM_API_PORT:-5000}:8080"
    depends_on:
      unipm-db:
        condition: service_healthy
      unipm-db-init:
        condition: service_completed_successfully
    networks:
      - unipm-network

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: unipm-prometheus
    profiles:
      - observability
    ports:
      - "${UNIPM_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - unipm-prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      unipm-api:
        condition: service_started
    networks:
      - unipm-network

  grafana:
    image: grafana/grafana:12.0.2
    container_name: unipm-grafana
    profiles:
      - observability
    environment:
      GF_SECURITY_ADMIN_USER: "${UNIPM_GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${UNIPM_GRAFANA_ADMIN_PASSWORD:-ChangeThisLocalGrafanaPassword123!}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${UNIPM_GRAFANA_PORT:-3000}:3000"
    volumes:
      - unipm-grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - unipm-network

volumes:
  unipm-sqlserver-2025-data:
  unipm-prometheus-data:
  unipm-grafana-data:

networks:
  unipm-network:
