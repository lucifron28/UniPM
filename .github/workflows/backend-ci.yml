name: Backend CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "ci/**"
      - "chore/**"
      - "test/**"
    paths:
      - ".github/workflows/backend-ci.yml"
      - "server/**"
      - "tests/**"
      - "database/**"
      - "global.json"
      - "UniPM.slnx"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/backend-ci.yml"
      - "server/**"
      - "tests/**"
      - "database/**"
      - "global.json"
      - "UniPM.slnx"

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  backend:
    name: Build and test backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore ./UniPM.slnx

      - name: Build solution
        run: dotnet build ./UniPM.slnx --configuration Release --no-restore

      - name: Run tests
        run: >
          dotnet test ./UniPM.slnx
          --configuration Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=backend-tests.trx"
          --blame-hang-timeout 5m
