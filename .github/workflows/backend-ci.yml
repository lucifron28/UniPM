name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Build and test backend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore ./UniPM.slnx

      - name: Build solution
        run: dotnet build ./UniPM.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ./UniPM.slnx --configuration Release --no-build --verbosity normal
