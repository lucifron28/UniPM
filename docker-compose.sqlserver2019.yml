services:
  unipm-db-2019:
    build:
      context: .
      dockerfile: database/sqlserver2019/Dockerfile
    image: unipm-sqlserver:2019-fts
    container_name: unipm-db-2019
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env}"
      TZ: "Asia/Manila"
    ports:
      - "${UNIPM_SQL2019_DB_PORT:-14339}:1433"
    volumes:
      - unipm-sqlserver-2019-data:/var/opt/mssql
    networks:
      - unipm-sqlserver-2019-network
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -b
          -Q "IF ISNULL(TRY_CONVERT(int, SERVERPROPERTY('IsFullTextInstalled')), 0) <> 1
          THROW 51021, 'SQL Server Full-Text Search is not installed.', 1;" -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  unipm-db-2019-init:
    image: unipm-sqlserver:2019-fts
    container_name: unipm-db-2019-init
    environment:
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env}"
    command:
      [
        "/bin/bash",
        "-c",
        '/opt/mssql-tools18/bin/sqlcmd -S unipm-db-2019 -U sa -P "$$MSSQL_SA_PASSWORD" -C -b -i /bootstrap/bootstrap.sql',
      ]
    volumes:
      - ./database/sqlserver2019/bootstrap.sql:/bootstrap/bootstrap.sql:ro
    depends_on:
      unipm-db-2019:
        condition: service_healthy
    networks:
      - unipm-sqlserver-2019-network

volumes:
  unipm-sqlserver-2019-data:

networks:
  unipm-sqlserver-2019-network:
